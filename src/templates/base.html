<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AIFitBot{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX: 轻量 Ajax / SSE -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <!-- Alpine.js: 轻量响应式交互 -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="/" class="text-lg font-bold text-indigo-600 no-underline">💪 AIFitBot</a>
            <div class="flex items-center gap-3 text-sm">
                {% if user %}
                    <span class="text-gray-600">{{ user.username }}</span>
                    {% if user.role.value == 'admin' %}
                        <a href="/admin/kb" class="text-indigo-600 hover:underline">知识库管理</a>
                    {% endif %}
                    <a href="/chat" class="text-indigo-600 hover:underline">对话</a>
                    <a href="/auth/logout" class="text-gray-400 hover:text-red-500">退出</a>
                {% else %}
                    <a href="/auth/login" class="text-indigo-600 hover:underline">登录</a>
                    <a href="/auth/register" class="text-indigo-600 hover:underline">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Flash 消息 -->
    {% if msg %}
    <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 4000)"
         class="fixed top-16 right-4 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded shadow-lg text-sm"
         role="alert">
        <span>{{ msg }}</span>
        <button @click="show = false" class="ml-3 font-bold">&times;</button>
    </div>
    {% endif %}
    {% if error %}
    <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
         class="fixed top-16 right-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded shadow-lg text-sm"
         role="alert">
        <span>{{ error }}</span>
        <button @click="show = false" class="ml-3 font-bold">&times;</button>
    </div>
    {% endif %}
</body>
</html>
