<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AIFitBot{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="nav-brand">💪 AIFitBot</a>
            <div class="nav-links">
                {% if user %}
                    <span class="nav-user">{{ user.username }}</span>
                    <a href="/chat">💬 对话</a>
                    {% if user.role.value == 'admin' %}
                        <a href="/admin/kb">📚 知识库</a>
                        <a href="/admin/dashboard">📊 仪表盘</a>
                    {% endif %}
                    <a href="/auth/password">⚙️ 改密</a>
                    <a href="/auth/logout" class="nav-logout">退出</a>
                {% else %}
                    <a href="/auth/login">登录</a>
                    <a href="/auth/register" class="btn btn-primary" style="padding:6px 16px;">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main style="max-width:1200px;margin:0 auto;padding:24px 20px;">
        {% block content %}{% endblock %}
    </main>

    {% if msg %}
    <div x-data="{show:true}" x-show="show" x-init="setTimeout(()=>show=false,4000)" class="toast toast-success">
        {{ msg }} <button @click="show=false" style="margin-left:12px;font-weight:700;border:none;background:none;cursor:pointer;">&times;</button>
    </div>
    {% endif %}
    {% if error %}
    <div x-data="{show:true}" x-show="show" x-init="setTimeout(()=>show=false,5000)" class="toast toast-error">
        {{ error }} <button @click="show=false" style="margin-left:12px;font-weight:700;border:none;background:none;cursor:pointer;">&times;</button>
    </div>
    {% endif %}
</body>
</html>
