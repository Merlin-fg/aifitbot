{% if sessions %}
    {% for sess in sessions %}
    <div class="session-item" data-session-id="{{ sess.id }}" onclick="switchSession({{ sess.id }}, this)">
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ sess.title }}</span>
        <button class="btn btn-ghost" style="padding:2px 6px;font-size:0.7rem;display:none;"
                onclick="event.stopPropagation();deleteSession({{ sess.id }})" title="删除">🗑</button>
    </div>
    {% endfor %}
    <style>.session-item:hover button { display:inline-flex !important; }</style>
{% else %}
    <p style="text-align:center;color:#a8a29e;font-size:0.8rem;padding:20px 0;">暂无历史会话</p>
{% endif %}
