{% if sessions %}{% for sess in sessions %}
<div class="session-item" data-session-id="{{ sess.id }}" onclick="switchSession({{ sess.id }}, this)">
    <span class="session-title">{{ sess.title }}</span>
    <button class="session-del" onclick="event.stopPropagation();deleteSession({{ sess.id }})" title="删除">×</button>
</div>{% endfor %}
{% else %}<p style="text-align:center;color:var(--color-text-tertiary);font-size:var(--text-sm);padding:var(--space-8) 0;">暂无会话</p>{% endif %}
