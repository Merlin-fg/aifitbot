{% extends "base.html" %}
{% block title %}知识库管理 - AIFitBot{% endblock %}
{% block content %}
<h1 style="font-size:1.5rem;font-weight:700;margin-bottom:20px;">📚 知识库管理</h1>

<div style="display:flex;gap:20px;">
    <div class="card" style="width:300px;flex-shrink:0;padding:20px;position:sticky;top:76px;align-self:flex-start;">
        <h2 style="font-weight:600;font-size:0.95rem;margin-bottom:16px;">📤 上传文档</h2>
        <form hx-encoding="multipart/form-data" hx-post="/api/admin/kb/upload" hx-target="#upload-status" hx-swap="innerHTML">
            <input type="file" name="file" required accept=".md,.pdf,.txt" class="input" style="margin-bottom:10px;">
            <p style="font-size:0.75rem;color:#a8a29e;margin-bottom:12px;">支持 .md / .pdf / .txt，最大 20MB</p>
            <button type="submit" class="btn btn-primary" style="width:100%;">上传并处理</button>
        </form>
        <div id="upload-status" style="font-size:0.85rem;margin-top:12px;"></div>
    </div>

    <div class="card" style="flex:1;padding:20px;">
        <h2 style="font-weight:600;font-size:0.95rem;margin-bottom:16px;">📋 已有文档</h2>
        <div id="doc-list" hx-get="/api/admin/kb/documents" hx-trigger="load, every 10s" hx-swap="innerHTML">
            <p style="color:#a8a29e;font-size:0.85rem;">加载中...</p>
        </div>
    </div>
</div>
{% endblock %}
