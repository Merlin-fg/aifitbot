{% extends "base.html" %}
{% block title %}对话 — AIFitBot{% endblock %}
{% block content %}
<div class="chat-layout">
    <!-- Sidebar -->
    <aside class="chat-sidebar">
        <div class="sidebar-header">
            <h3>我的会话</h3>
            <button onclick="newSession()" class="btn btn-ghost btn-icon" title="新建会话" style="font-size:1.2rem;">+</button>
        </div>
        <div id="session-list" class="sidebar-list"
             hx-get="/chat/session/list" hx-trigger="load, sessionChanged from:body" hx-swap="innerHTML">
            <p style="text-align:center;color:var(--color-text-tertiary);font-size:var(--text-sm);padding:var(--space-8) 0;">加载中...</p>
        </div>
        <div class="sidebar-footer">
            <a href="/auth/password">改密</a>
            {% if user.role.value == 'admin' %}<a href="/admin/kb">知识库</a>{% endif %}
        </div>
    </aside>

    <!-- Main chat -->
    <div class="chat-main">
        <div id="chat-messages" class="chat-messages">
            <div id="chat-welcome" class="chat-welcome">
                <div class="welcome-icon">💪</div>
                <p class="welcome-title">AIFitBot 健身教练</p>
                <p class="welcome-sub">向我提问关于训练、饮食或拉伸的任何问题</p>
            </div>
        </div>

        <div class="chat-input-area">
            <form id="chat-form" onsubmit="handleStreamSubmit(event)" style="margin:0;">
                <input type="hidden" name="session_id" id="current-session-id" value="0">
                <div class="chat-input-row">
                    <input type="text" id="chat-input" name="question" class="input" placeholder="输入你的健身问题..." autofocus>
                    <button type="submit" id="send-btn" class="btn btn-primary" style="padding:10px 22px;">发送</button>
                    <button type="button" id="stop-btn" onclick="stopStream()" class="btn btn-danger" style="padding:10px 18px;display:none;">中断</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
let activeSessionId=0,isStreaming=false,streamingSessionId=0,streamAbortController=null,streamFullAnswer='',streamReferences=null,streamQuestion='';

async function handleStreamSubmit(e){
    e.preventDefault();
    const input=document.getElementById('chat-input'),question=input.value.trim();
    if(!question||isStreaming)return;
    input.value='';
    const sid=activeSessionId;
    isStreaming=true;streamingSessionId=sid;streamFullAnswer='';streamReferences=null;streamQuestion=question;
    updateStopButton();
    renderStreamingUI(question);
    const fd=new FormData();fd.append('question',question);fd.append('session_id',sid);
    streamAbortController=new AbortController();
    try{
        const resp=await fetch('/chat/stream',{method:'POST',body:fd,signal:streamAbortController.signal});
        const reader=resp.body.getReader(),decoder=new TextDecoder();
        let buffer='',fullAnswer='';
        while(true){
            const{done,value}=await reader.read();if(done)break;
            buffer+=decoder.decode(value,{stream:true});
            const lines=buffer.split('\n');
            for(let i=0;i<lines.length-1;i++){
                const line=lines[i].trim();
                if(!line.startsWith('data: '))continue;
                try{
                    const data=JSON.parse(line.slice(6));
                    if(data.type==='session'){streamingSessionId=data.session_id;if(activeSessionId===0){activeSessionId=data.session_id;document.getElementById('current-session-id').value=data.session_id;}}
                    else if(data.type==='token'){streamFullAnswer+=data.text;if(activeSessionId===streamingSessionId)updateStreamingDOM();}
                    else if(data.type==='references'){streamReferences=data.refs;if(activeSessionId===streamingSessionId)updateStreamingDOM();}
                    else if(data.type==='error'){if(activeSessionId===streamingSessionId){const a=document.getElementById('streaming-response');if(a)a.innerHTML='<span style="color:var(--color-error);">'+escapeHtml(data.text)+'</span>';}}
                }catch{}
            }
            buffer=lines[lines.length-1];
        }
        const aiDiv=document.getElementById('streaming-response');if(aiDiv)aiDiv.classList.remove('typing-cursor');
    }catch(err){if(err.name!=='AbortError'){const a=document.getElementById('streaming-response');if(a)a.innerHTML='<span style="color:var(--color-error);">连接失败</span>';}}
    htmx.trigger('#session-list','sessionChanged');resetSendButton();input.focus();
}

function renderStreamingUI(question,skipUserMsg){
    const messages=document.getElementById('chat-messages');
    document.getElementById('chat-welcome')?.remove();
    const old=document.getElementById('streaming-response');if(old)old.remove();
    if(!skipUserMsg){const d=document.createElement('div');d.className='message-user';d.textContent=question||streamQuestion||'(...)';messages.appendChild(d);}
    const ai=document.createElement('div');ai.className='message-assistant typing-cursor';ai.id='streaming-response';
    if(streamFullAnswer)ai.innerHTML=escapeHtml(streamFullAnswer).replace(/\n/g,'<br>')+'<span class="typing-cursor"></span>';
    messages.appendChild(ai);messages.scrollTop=messages.scrollHeight;
}

function updateStreamingDOM(){
    const ai=document.getElementById('streaming-response');if(!ai)return;
    let h=escapeHtml(streamFullAnswer).replace(/\n/g,'<br>');
    if(streamReferences?.length){h+='<details class="references-box"><summary>引用来源（'+streamReferences.length+' 条）</summary>';streamReferences.forEach((r,i)=>{h+='<div style="font-size:.78rem;margin-top:4px;"><span style="font-weight:600;">['+(i+1)+'] '+escapeHtml(r.source)+'</span> <span style="color:var(--color-text-tertiary);">(相似度:'+r.score+')</span><p style="color:var(--color-text-secondary);">'+escapeHtml(r.content)+'...</p></div>';});h+='</details>';}
    ai.innerHTML=h+'<span class="typing-cursor"></span>';
    const mc=document.getElementById('chat-messages');if(mc.scrollHeight-mc.scrollTop-mc.clientHeight<80)mc.scrollTop=mc.scrollHeight;
}

function stopStream(){if(streamAbortController){streamAbortController.abort();streamAbortController=null;}resetSendButton();const a=document.getElementById('streaming-response');if(a){a.classList.remove('typing-cursor');a.removeAttribute('id');if(a.textContent.trim()==='')a.innerHTML='<span style="color:var(--color-text-tertiary);">已中断</span>';}}
function resetSendButton(){isStreaming=false;streamingSessionId=0;streamAbortController=null;streamQuestion='';updateStopButton();}
function updateStopButton(){if(isStreaming&&activeSessionId===streamingSessionId){document.getElementById('send-btn').style.display='none';document.getElementById('stop-btn').style.display='inline-flex';}else{document.getElementById('send-btn').style.display='inline-flex';document.getElementById('stop-btn').style.display='none';}}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

async function switchSession(sid,el){
    if(activeSessionId===sid)return;
    activeSessionId=sid;document.getElementById('current-session-id').value=sid;
    document.querySelectorAll('.session-item').forEach(i=>i.classList.remove('active'));
    if(el)el.classList.add('active');
    updateStopButton();
    const r=await fetch('/chat/messages/'+sid);const h=await r.text();
    document.getElementById('chat-messages').innerHTML=h||'<div class="chat-welcome"><div class="welcome-icon">💪</div><p class="welcome-title">开始新对话</p></div>';
    if(isStreaming&&streamingSessionId===sid)renderStreamingUI(null,true);
}
async function newSession(){
    const fd=new FormData();fd.append('title','新对话');
    const r=await fetch('/chat/session/new',{method:'POST',body:fd});const d=await r.json();
    activeSessionId=d.session_id;document.getElementById('current-session-id').value=d.session_id;
    document.getElementById('chat-messages').innerHTML='<div class="chat-welcome"><div class="welcome-icon">💪</div><p class="welcome-title">开始新对话</p></div>';
    updateStopButton();htmx.trigger('#session-list','sessionChanged');
}
async function deleteSession(sid){
    if(!confirm('确定删除？'))return;
    if(isStreaming&&streamingSessionId===sid)stopStream();
    const fd=new FormData();fd.append('session_id',sid);
    await fetch('/chat/session/delete',{method:'DELETE',body:fd});
    if(activeSessionId===sid){activeSessionId=0;document.getElementById('current-session-id').value='0';document.getElementById('chat-messages').innerHTML='<div class="chat-welcome"><div class="welcome-icon">💪</div><p class="welcome-title">选择一个会话开始对话</p></div>';}
    htmx.trigger('#session-list','sessionChanged');
}
</script>
{% endblock %}
