{% extends "base.html" %}
{% block title %}健身档案 — AIFitBot{% endblock %}
{% block content %}
<div style="max-width:480px;margin:60px auto;padding:0 20px;">
    <h2 style="margin-bottom:24px;">🏋️ 健身档案</h2>
    <p style="color:var(--c-text2);margin-bottom:24px;font-size:var(--t-sm);">填写身体数据后，AI 教练将为你量身定制训练建议。</p>

    <form hx-put="/api/auth/profile" hx-target="#profile-msg" hx-swap="innerHTML">
        <div style="display:grid;gap:16px;">
            <div>
                <label class="label">年龄</label>
                <input type="number" name="age" class="input" value="{{ user.age or '' }}" placeholder="例: 25" min="10" max="120">
            </div>
            <div>
                <label class="label">性别</label>
                <select name="gender" class="input">
                    <option value="">不设置</option>
                    <option value="男" {% if user.gender=='男' %}selected{% endif %}>男</option>
                    <option value="女" {% if user.gender=='女' %}selected{% endif %}>女</option>
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div>
                    <label class="label">身高 (cm)</label>
                    <input type="number" name="height_cm" class="input" value="{{ user.height_cm or '' }}" placeholder="例: 170">
                </div>
                <div>
                    <label class="label">体重 (kg)</label>
                    <input type="number" name="weight_kg" class="input" value="{{ user.weight_kg or '' }}" placeholder="例: 65" step="0.1">
                </div>
            </div>
            <div>
                <label class="label">健身目标</label>
                <select name="goal" class="input">
                    <option value="">不设置</option>
                    <option value="增肌" {% if user.goal=='增肌' %}selected{% endif %}>增肌</option>
                    <option value="减脂" {% if user.goal=='减脂' %}selected{% endif %}>减脂</option>
                    <option value="塑形" {% if user.goal=='塑形' %}selected{% endif %}>塑形</option>
                    <option value="增力" {% if user.goal=='增力' %}selected{% endif %}>增力</option>
                    <option value="保持健康" {% if user.goal=='保持健康' %}selected{% endif %}>保持健康</option>
                </select>
            </div>
            <div>
                <label class="label">可用器械</label>
                <input type="text" name="equipment" class="input" value="{{ user.equipment or '' }}" placeholder="例: 哑铃、弹力带、单杠">
            </div>
            <div>
                <label class="label">伤病/注意事项</label>
                <input type="text" name="injuries" class="input" value="{{ user.injuries or '' }}" placeholder="例: 左膝旧伤、腰椎间盘突出">
            </div>
        </div>
        <div id="profile-msg" style="margin-top:8px;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px;">💾 保存档案</button>
    </form>

    <div style="margin-top:32px;text-align:center;">
        <a href="/chat" class="btn btn-ghost">← 返回对话</a>
    </div>
</div>
{% endblock %}
