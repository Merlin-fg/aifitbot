{% extends "base.html" %}
{% block title %}登录 - AIFitBot{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <h1 class="text-2xl font-bold text-center mb-6">登录 AIFitBot</h1>

        <form method="POST" action="/auth/login" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="请输入用户名">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="请输入密码">
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
                登录
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            还没有账号？<a href="/auth/register" class="text-indigo-600 hover:underline">立即注册</a>
        </p>
    </div>
</div>
{% endblock %}
