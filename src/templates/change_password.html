{% extends "base.html" %}
{% block title %}修改密码 - AIFitBot{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <h1 class="text-2xl font-bold text-center mb-6">修改密码</h1>

        <form method="POST" action="/auth/password" class="space-y-4">
            <div>
                <label for="old_password" class="block text-sm font-medium text-gray-700 mb-1">原密码</label>
                <input type="password" id="old_password" name="old_password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="请输入原密码">
            </div>
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
                <input type="password" id="new_password" name="new_password" required minlength="6"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="至少 6 个字符">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">确认新密码</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="再次输入新密码">
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
                确认修改
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            <a href="/chat" class="text-indigo-600 hover:underline">返回对话</a>
        </p>
    </div>
</div>
{% endblock %}
