{% extends "base.html" %}
{% block title %}修改密码 - AIFitBot{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto;">
    <div class="card" style="padding:32px;">
        <h1 style="font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:24px;">修改密码</h1>
        <form method="POST" action="/auth/password" style="display:flex;flex-direction:column;gap:16px;">
            <div>
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#44403c;margin-bottom:4px;">原密码</label>
                <input type="password" name="old_password" required class="input" placeholder="请输入原密码">
            </div>
            <div>
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#44403c;margin-bottom:4px;">新密码</label>
                <input type="password" name="new_password" required minlength="6" class="input" placeholder="至少 6 个字符">
            </div>
            <div>
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#44403c;margin-bottom:4px;">确认新密码</label>
                <input type="password" name="confirm_password" required minlength="6" class="input" placeholder="再次输入新密码">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">确认修改</button>
        </form>
        <p style="text-align:center;font-size:0.85rem;margin-top:16px;">
            <a href="/chat" style="color:#059669;text-decoration:none;">← 返回对话</a>
        </p>
    </div>
</div>
{% endblock %}
