{% extends "base.html" %}
{% block title %}修改密码 — AIFitBot{% endblock %}
{% block content %}
<div class="form-page">
    <div class="card form-card">
        <h1>🔒 修改密码</h1>
        <form method="POST" action="/auth/password">
            <div class="form-group">
                <label>原密码</label>
                <input type="password" name="old_password" required class="input" placeholder="请输入原密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" required minlength="6" class="input" placeholder="至少 6 个字符">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" name="confirm_password" required minlength="6" class="input" placeholder="再次输入新密码">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">确认修改</button>
        </form>
        <p class="form-footer"><a href="/chat">← 返回对话</a></p>
    </div>
</div>
{% endblock %}
