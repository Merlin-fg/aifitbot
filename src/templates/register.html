{% extends "base.html" %}
{% block title %}注册 - AIFitBot{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto;">
    <div class="card" style="padding:32px;">
        <h1 style="font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:24px;">注册 AIFitBot</h1>
        <form method="POST" action="/auth/register" style="display:flex;flex-direction:column;gap:16px;">
            <div>
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#44403c;margin-bottom:4px;">用户名</label>
                <input type="text" name="username" required minlength="2" class="input" placeholder="至少 2 个字符">
            </div>
            <div>
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#44403c;margin-bottom:4px;">密码</label>
                <input type="password" name="password" required minlength="6" class="input" placeholder="至少 6 个字符">
            </div>
            <div>
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#44403c;margin-bottom:4px;">确认密码</label>
                <input type="password" name="confirm_password" required minlength="6" class="input" placeholder="再次输入密码">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">注册</button>
        </form>
        <p style="text-align:center;font-size:0.85rem;color:#78716c;margin-top:16px;">
            已有账号？<a href="/auth/login" style="color:#059669;font-weight:500;text-decoration:none;">立即登录</a>
        </p>
    </div>
</div>
{% endblock %}
